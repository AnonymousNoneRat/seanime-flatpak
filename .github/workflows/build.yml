name: Build and Release Flatpak

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder elfutils
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(grep -oP '(?<=download/v)[0-9.]+(?=/)' io.github.5rahim.Seanime.yml | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Found version: $VERSION"

      - name: Build Flatpak
        run: |
          flatpak-builder --user --install --force-clean --repo=repo builddir io.github.5rahim.Seanime.yml
          flatpak build-bundle repo Seanime.flatpak io.github.5rahim.Seanime

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Seanime v${{ steps.version.outputs.version }}
          body: Flatpak build of Seanime v${{ steps.version.outputs.version }}. Download the .flatpak file below and install with "flatpak install Seanime.flatpak"
          files: Seanime.flatpak
          token: ${{ secrets.GITHUB_TOKEN }}
